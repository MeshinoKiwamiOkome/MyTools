<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人に人が染み込む / Human Seeping Into Human</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #ccc;
    }
    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      margin-bottom: 12px;
      opacity: 0.7;
    }
    canvas {
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100, 160, 255, 0.2);
    }
    #info {
      margin-top: 14px;
      font-size: 0.8rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }
    #resetBtn {
      margin-top: 16px;
      padding: 8px 28px;
      background: transparent;
      border: 1px solid rgba(100,160,255,0.4);
      color: #aac4ff;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      transition: background 0.3s;
    }
    #resetBtn:hover { background: rgba(100,160,255,0.15); }
  </style>
</head>
<body>
  <h1>人に人が染み込む</h1>
  <canvas id="canvas"></canvas>
  <div id="info">粒子が染み込むほど、相手の色が変わっていく</div>
  <button id="resetBtn">リセット</button>

  <script>
    // =============================================
    // MIT License
    // Copyright (c) 2026 Human-Seeping Visualization
    // =============================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // ---- キャンバスサイズ ----
    const W = 700, H = 420;
    canvas.width = W;
    canvas.height = H;

    // ---- 色設定 ----
    const COLOR_A = { r: 80,  g: 140, b: 255 }; // 人Aの色（青）
    const COLOR_B = { r: 255, g: 100, b: 120 }; // 人Bの色（赤）

    // ---- 人物シルエット定義（SVGパスをCanvas描画用に変換） ----
    // 簡略化した人型を描く関数
    function drawHumanPath(ctx, cx, cy, scale) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);
      // 頭
      ctx.beginPath();
      ctx.arc(0, -90, 28, 0, Math.PI * 2);
      ctx.closePath();
      // 胴体
      ctx.moveTo(-30, -60);
      ctx.lineTo(-38, 0);
      ctx.lineTo(-22, 0);
      ctx.lineTo(-18, 50);
      ctx.lineTo(18, 50);
      ctx.lineTo(22, 0);
      ctx.lineTo(38, 0);
      ctx.lineTo(30, -60);
      ctx.closePath();
      // 左足
      ctx.moveTo(-18, 50);
      ctx.lineTo(-24, 110);
      ctx.lineTo(-8, 110);
      ctx.lineTo(-4, 50);
      ctx.closePath();
      // 右足
      ctx.moveTo(4, 50);
      ctx.lineTo(8, 110);
      ctx.lineTo(24, 110);
      ctx.lineTo(18, 50);
      ctx.closePath();
      ctx.restore();
    }

    // ---- 人物オブジェクト ----
    const personA = { x: 170, y: 230, scale: 1.0, color: { ...COLOR_A }, infusion: 0 };
    const personB = { x: 530, y: 230, scale: 1.0, color: { ...COLOR_B }, infusion: 0 };

    // ---- パーティクル ----
    let particles = [];
    const MAX_PARTICLES = 180;
    let absorbedCount = 0;

    // パーティクル生成（人Aの輪郭付近からランダムに放出）
    function spawnParticle() {
      if (particles.length >= MAX_PARTICLES) return;
      // 人Aのシルエット内ランダム点（簡略：楕円近似）
      const angle = Math.random() * Math.PI * 2;
      const rx = 38 * personA.scale;
      const ry = 100 * personA.scale;
      const ox = Math.cos(angle) * rx * (0.3 + Math.random() * 0.7);
      const oy = Math.sin(angle) * ry * (0.3 + Math.random() * 0.7) - 20;

      particles.push({
        x: personA.x + ox,
        y: personA.y + oy,
        vx: 0,
        vy: 0,
        size: 2.5 + Math.random() * 3,
        alpha: 0.9 + Math.random() * 0.1,
        color: { ...personA.color },
        state: 'flying',   // 'flying' | 'seeping' | 'absorbed'
        seepProgress: 0,
        delay: Math.random() * 60,  // フレーム遅延
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.04 + Math.random() * 0.04,
        speed: 1.2 + Math.random() * 1.5,
      });
    }

    // ---- 人Bのシルエット内判定（簡略楕円） ----
    function isInsidePersonB(x, y) {
      const dx = x - personB.x;
      const dy = y - (personB.y - 20);
      return (dx * dx) / (42 * 42) + (dy * dy) / (105 * 105) < 1;
    }

    // ---- 色補間 ----
    function lerpColor(c1, c2, t) {
      return {
        r: Math.round(c1.r + (c2.r - c1.r) * t),
        g: Math.round(c1.g + (c2.g - c1.g) * t),
        b: Math.round(c1.b + (c2.b - c1.b) * t),
      };
    }

    function colorStr(c, a = 1) {
      return `rgba(${c.r},${c.g},${c.b},${a})`;
    }

    // ---- 人物描画 ----
    function drawPerson(person, label) {
      ctx.save();

      // グロー（染み込み度合いで強さ変化）
      const glowColor = colorStr(person.color, 0.25 + person.infusion * 0.3);
      ctx.shadowColor = colorStr(person.color, 1);
      ctx.shadowBlur = 18 + person.infusion * 20;

      // シルエット塗り
      const grad = ctx.createRadialGradient(
        person.x, person.y - 20, 5,
        person.x, person.y - 20, 110
      );
      grad.addColorStop(0, colorStr(person.color, 0.9));
      grad.addColorStop(1, colorStr(person.color, 0.5));

      ctx.fillStyle = grad;
      drawHumanPath(ctx, person.x, person.y, person.scale);
      ctx.fill();

      // 輪郭線
      ctx.shadowBlur = 0;
      ctx.strokeStyle = colorStr(person.color, 0.6);
      ctx.lineWidth = 1.5;
      drawHumanPath(ctx, person.x, person.y, person.scale);
      ctx.stroke();

      // ラベル
      ctx.shadowBlur = 0;
      ctx.fillStyle = colorStr(person.color, 0.8);
      ctx.font = '13px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(label, person.x, person.y + 145);

      // 染み込み度バー
      const barW = 80, barH = 6;
      const bx = person.x - barW / 2;
      const by = person.y + 158;
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.beginPath();
      ctx.roundRect(bx, by, barW, barH, 3);
      ctx.fill();
      ctx.fillStyle = colorStr(person.color, 0.8);
      ctx.beginPath();
      ctx.roundRect(bx, by, barW * person.infusion, barH, 3);
      ctx.fill();

      ctx.restore();
    }

    // ---- パーティクル描画 ----
    function drawParticles() {
      particles.forEach(p => {
        if (p.state === 'absorbed') return;
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.shadowColor = colorStr(p.color, 0.8);
        ctx.shadowBlur = 8;
        ctx.fillStyle = colorStr(p.color, 1);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    // ---- 接続線（人A → 粒子群の軌跡ヒント） ----
    function drawConnectionHint() {
      const flyingParticles = particles.filter(p => p.state === 'flying' && p.delay <= 0);
      if (flyingParticles.length === 0) return;
      ctx.save();
      ctx.strokeStyle = `rgba(${COLOR_A.r},${COLOR_A.g},${COLOR_A.b},0.04)`;
      ctx.lineWidth = 1;
      flyingParticles.forEach(p => {
        ctx.beginPath();
        ctx.moveTo(personA.x, personA.y - 20);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      });
      ctx.restore();
    }

    // ---- 染み込みエフェクト（人Bの周囲に波紋） ----
    let ripples = [];
    function addRipple() {
      ripples.push({ x: personB.x, y: personB.y - 20, r: 10, alpha: 0.6 });
    }
    function updateDrawRipples() {
      ripples = ripples.filter(r => r.alpha > 0.01);
      ripples.forEach(r => {
        ctx.save();
        ctx.strokeStyle = colorStr(personA.color, r.alpha);
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.r * 0.4, r.r, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
        r.r += 2.5;
        r.alpha *= 0.92;
      });
    }

    // ---- 背景グリッド（雰囲気演出） ----
    function drawBackground() {
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, W, H);

      // 薄いグリッド
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // 中央の矢印ヒント
      const midX = (personA.x + personB.x) / 2;
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = colorStr(COLOR_A, 1);
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(personA.x + 50, H / 2 - 20);
      ctx.lineTo(personB.x - 50, H / 2 - 20);
      ctx.stroke();
      // 矢頭
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(personB.x - 50, H / 2 - 26);
      ctx.lineTo(personB.x - 38, H / 2 - 20);
      ctx.lineTo(personB.x - 50, H / 2 - 14);
      ctx.stroke();
      ctx.restore();
    }

    // ---- タイトル・進捗テキスト ----
    function drawUI() {
      const pct = Math.round(personB.infusion * 100);
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '12px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(`染み込み度: ${pct}%`, W / 2, H - 16);
      ctx.restore();
    }

    // ---- メインループ ----
    let frame = 0;
    function update() {
      frame++;

      // パーティクル生成（一定間隔）
      if (frame % 4 === 0 && absorbedCount < MAX_PARTICLES) {
        spawnParticle();
      }

      particles.forEach(p => {
        if (p.delay > 0) { p.delay--; return; }
        if (p.state === 'absorbed') return;

        if (p.state === 'flying') {
          // 人Bへ向かうベクトル
          const tx = personB.x + (Math.random() - 0.5) * 30;
          const ty = (personB.y - 20) + (Math.random() - 0.5) * 80;
          const dx = tx - p.x;
          const dy = ty - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          // ふわふわ揺れ
          p.wobble += p.wobbleSpeed;
          const wobbleX = Math.sin(p.wobble) * 1.5;
          const wobbleY = Math.cos(p.wobble * 0.7) * 1.0;

          p.vx += (dx / dist) * 0.18 + wobbleX * 0.05;
          p.vy += (dy / dist) * 0.18 + wobbleY * 0.05;

          // 速度制限
          const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
          if (speed > p.speed) {
            p.vx = (p.vx / speed) * p.speed;
            p.vy = (p.vy / speed) * p.speed;
          }

          p.x += p.vx;
          p.y += p.vy;

          // 人Bに到達したら染み込み開始
          if (isInsidePersonB(p.x, p.y)) {
            p.state = 'seeping';
            addRipple();
          }
        }

        if (p.state === 'seeping') {
          // 人Bの中心に向かって収縮
          const cx = personB.x;
          const cy = personB.y - 20;
          p.x += (cx - p.x) * 0.08;
          p.y += (cy - p.y) * 0.08;
          p.size *= 0.93;
          p.alpha *= 0.95;
          p.seepProgress += 0.04;

          if (p.seepProgress >= 1 || p.size < 0.3) {
            p.state = 'absorbed';
            absorbedCount++;
            // 人Bの色を人Aの色に近づける
            const t = Math.min(absorbedCount / MAX_PARTICLES, 1);
            personB.color = lerpColor(COLOR_B, COLOR_A, t * 0.85);
            personB.infusion = t;
          }
        }
      });

      // 吸収済みパーティクルを定期的に除去
      if (frame % 120 === 0) {
        particles = particles.filter(p => p.state !== 'absorbed');
      }
    }

    function draw() {
      drawBackground();
      drawConnectionHint();
      updateDrawRipples();
      drawPerson(personA, '人 A（発信者）');
      drawPerson(personB, '人 B（受容者）');
      drawParticles();
      drawUI();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // ---- リセット ----
    document.getElementById('resetBtn').addEventListener('click', () => {
      particles = [];
      absorbedCount = 0;
      frame = 0;
      personB.color = { ...COLOR_B };
      personB.infusion = 0;
      ripples = [];
    });

    loop();
  </script>
</body>
</html>
